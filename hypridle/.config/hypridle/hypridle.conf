general {
    lock_cmd = pidof swaylock || /home/dxle/bin/launch-lock-screen       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = /home/dxle/bin/launch-lock-screen    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

listener {
    timeout = 300                                 # 5min
    on-timeout = /home/dxle/bin/launch-lock-screen            # lock screen when timeout has passed
}

llistener {
    timeout = 1200
    on-timeout = hyprctl dispatch dpms off
}
