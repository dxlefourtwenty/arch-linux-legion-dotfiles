general {
    lock_cmd = $HOME/.config/hyprlock/scripts/launch-lock-screen.sh       # refresh wallpaper link before lock.
    before_sleep_cmd = $HOME/.config/hyprlock/scripts/launch-lock-screen.sh    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

listener {
    timeout = 600                                 # 10min
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

