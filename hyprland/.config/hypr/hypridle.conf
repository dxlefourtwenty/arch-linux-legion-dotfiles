general {
    lock_cmd = pidof swaylock || /home/dxle/bin/launch-lock-screen       # avoid starting multiple swaylock instances.
    before_sleep_cmd = /home/dxle/bin/launch-lock-screen    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

listener {
    timeout = 600                                 # 10min
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

