###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, ~/bin/launch-terminal
bind = $mainMod SHIFT, RETURN, exec, ~/bin/launch-tmux-main
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod SHIFT, F, exec, ~/bin/menu-files
bind = $mainMod ALT, SPACE, exec, ~/bin/menu
bind = ALT, SPACE, exec, ~/bin/menu-apps
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Wallpapers
bind = $mainMod CTRL SHIFT, SPACE, exec, ~/bin/bg-prev
bind = $mainMod CTRL, SPACE, exec, ~/bin/bg-next
bind = $mainMod CTRL ALT, SPACE, exec, ~/bin/bg-set
bind = $mainMod CTRL ALT, M, exec, ~/bin/bg-live

# Dashboard
bind = $mainMod SHIFT, D, exec, ~/bin/toggle-dashboard

# Menus
bind = $mainMod SHIFT, P, exec, ~/bin/menu-power
bind = $mainMod SHIFT, K, exec, ~/bin/menu-keybindings
bind = $mainMod, C, exec, ~/bin/menu-color-converter

# Screenshot and Color Picker
bind = $mainMod SHIFT, S, exec, ~/bin/launch-screenshot-clipboard
bind = $mainMod SHIFT, C, exec, ~/bin/launch-colorpicker

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move Windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Quit Window
bind = $mainMod SHIFT, Q, killactive

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6 
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Window Editing
binds {
  drag_threshold = 10    
}
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = ALT SHIFT,  F, togglefloating
bind = $mainMod CTRL SHIFT, F, fullscreen 

# Scroll through windows when layout is set to scrolling
bindl = $mainMod, mouse_down, workspace, +1
bindl = $mainMod, mouse_up, workspace, -1

# Volume
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
