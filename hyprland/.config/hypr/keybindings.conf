###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Hyprland Environment
bind = $mainMod SHIFT CTRL, R, exec, ~/bin/reload-hyprland
bind = $mainMod SHIFT CTRL, W, exec, ~/bin/reload-waybar
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, killactive

# terminals
bind = $mainMod, RETURN, exec, ~/bin/launch-terminal
bind = $mainMod SHIFT, RETURN, exec, ~/bin/launch-tmux-main

# Menus
bind = $mainMod, SPACE, exec, ~/bin/menu
bind = $mainMod ALT, SPACE, exec, ~/bin/menu-apps
bind = $mainMod ALT, P, exec, ~/bin/menu-power
bind = $mainMod ALT, K, exec, ~/bin/menu-keybindings
bind = $mainMod ALT, F, exec, ~/bin/menu-files
bind = $mainMod ALT, L, exec, ~/bin/menu-learn
bind = $mainMod, C, exec, ~/bin/menu-color-converter
bind = $mainMod ALT, C, exec, ~/bin/menu-clipboard
bind = $mainMod ALT, T, exec, ~/bin/menu-theme
bind = $mainMod ALT, B, exec, ~/bin/menu-waybar
bind = $mainMod ALT, S, exec, ~/bin/menu-screenshot
bind = $mainMod SHIFT ALT, S, exec, ~/bin/menu-capture

# Backgrounds
bind = CTRL ALT SHIFT, SPACE, exec, ~/bin/bg-prev
bind = CTRL ALT, SPACE, exec, ~/bin/bg-next
bind = $mainMod CTRL ALT, SPACE, exec, ~/bin/bg-set
bind = $mainMod CTRL ALT, M, exec, ~/bin/bg-live

# Toggles
bind = $mainMod SHIFT, C, exec, ~/bin/launch-colorpicker
bind = $mainMod SHIFT, A, exec, ~/bin/launch-terminal btop
bind = $mainMod SHIFT, D, exec, ~/bin/toggle-dashboard

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move Windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, settiled
bind = $mainMod SHIFT, 1, movetoworkspace, 1

bind = $mainMod SHIFT, 2, settiled
bind = $mainMod SHIFT, 2, movetoworkspace, 2

bind = $mainMod SHIFT, 3, settiled
bind = $mainMod SHIFT, 3, movetoworkspace, 3

bind = $mainMod SHIFT, 4, settiled
bind = $mainMod SHIFT, 4, movetoworkspace, 4

bind = $mainMod SHIFT, 5, settiled
bind = $mainMod SHIFT, 5, movetoworkspace, 5

bind = $mainMod SHIFT, 6, settiled
bind = $mainMod SHIFT, 6, movetoworkspace, 6 

bind = $mainMod SHIFT, 7, settiled
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, settiled
bind = $mainMod SHIFT, 8, movetoworkspace, 8

bind = $mainMod SHIFT, 9, settiled
bind = $mainMod SHIFT, 9, movetoworkspace, 9

bind = $mainMod SHIFT, 0, settiled
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# special workspace
bind = $mainMod, O, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, O, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 1200 800 && hyprctl dispatch centerwindow && hyprctl dispatch movetoworkspace special:scratchpad
# Window Editing
binds {
  drag_threshold = 10    
}
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT,  F, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 1200 800

bind = $mainMod, F, fullscreen 
bind = $mainMod, T, settiled

# Scroll through windows when layout is set to scrolling
bindl = $mainMod, mouse_down, workspace, +1
bindl = $mainMod, mouse_up, workspace, -1

# Volume
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
