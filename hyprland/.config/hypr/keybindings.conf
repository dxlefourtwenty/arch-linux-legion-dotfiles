###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Menus
bindd = $mainMod ALT, SPACE, Menu, exec, ~/bin/menu
bindd = $mainMod, SPACE, App Launcher, exec, ~/bin/menu-apps
bindd = $mainMod ALT, P, System Menu, exec, ~/bin/menu-system
bindd = $mainMod ALT, K, Keybindings Menu, exec, ~/bin/menu-keybindings
bindd = $mainMod SHIFT ALT, K, Neovim Keybindings, exec, ~/bin/menu-neovim-bindings
bindd = $mainMod ALT, F, File Menu, exec, ~/bin/menu-files
bindd = $mainMod ALT, L, Learn Menu, exec, ~/bin/menu-learn
bindd = $mainMod ALT, C, Clipboard Menu, exec, ~/bin/menu-clipboard
bindd = $mainMod ALT SHIFT, C, Color Converter, exec, ~/bin/menu-color-converter
bindd = $mainMod ALT, T, Theme Menu, exec, ~/bin/menu-theme
bindd = $mainMod SHIFT ALT, T, Style Menu, exec, ~/bin/menu-style
bindd = $mainMod ALT, B, Top Bar Menu, exec, ~/bin/menu-waybar
bindd = $mainMod ALT, S, Screenshot Menu, exec, ~/bin/menu-screenshot
bindd = $mainMod SHIFT, S, Quick Screenshot, exec, ~/bin/launch-screenshot-clipboard
bindd = $mainMod SHIFT ALT, S, Capture Menu, exec, ~/bin/menu-capture
bindd = $mainMod ALT, V, Audio Menu, exec, ~/bin/menu-audio
bindd = $mainMod ALT, I, Install Menu, exec, ~/bin/menu-install
bindd = $mainMod ALT, E, Emoji Menu, exec, ~/bin/menu-emojis
bindd = $mainMod ALT, U, Unicode Menu, exec, ~/bin/menu-unicode
bindd = $mainMod ALT, N, Share Menu, exec, ~/bin/menu-share
bindd = $mainMod ALT, J, Tools Menu, exec, ~/bin/menu-tools
bindd = $mainMod ALT, D, Dashboard Menu, exec, ~/bin/menu-tasks

# terminals
bindd = $mainMod, RETURN, Terminal, exec, ~/bin/launch-terminal
bindd = $mainMod SHIFT, RETURN, Main Tmux, exec, ~/bin/launch-tmux-main

# Backgrounds
bindd = CTRL ALT, SPACE, Next Background, exec, ~/bin/bg-next
bindd = CTRL ALT SHIFT, SPACE, Previous Background, exec, ~/bin/bg-prev
bindd = $mainMod CTRL ALT, SPACE, Set Background, exec, ~/bin/bg-set
bindd = $mainMod CTRL ALT, M, Live Background, exec, ~/bin/bg-live

# App Control
bindd = $mainMod SHIFT, C, Color Picker, exec, ~/bin/launch-colorpicker
bindd = $mainMod SHIFT, A, Activity, exec, ~/bin/launch-terminal btop
bindd = $mainMod SHIFT, D, Dashboard, exec, ~/bin/toggle-dashboard
bindd = $mainMod SHIFT, B, Toggle Top Bar, exec, ~/bin/toggle-waybar
bindd = $mainMod SHIFT ALT, F, File Explorer, exec, nemo
bindd = $mainMod, B, Browser, exec, chromium

# OBS Control
bindd = ALT, F9, Start OBS Recording, sendshortcut, ALT, F9, class:^com\\.obsproject\\.Studio$
bindd = ALT SHIFT, F9, Stop OBS Recording, sendshortcut, ALT SHIFT, F9, class:^com\\.obsproject\\.Studio$
bindd = ALT, F10, Pause OBS Recording, sendshortcut, ALT, F10, class:^com\\.obsproject\\.Studio$
bindd = ALT SHIFT, F10, Resume OBS Recording, sendshortcut, ALT SHIFT, F10, class:^com\\.obsproject\\.Studio$

# Move focus with mainMod + arrow keys
bindd = $mainMod, Left, Focus Window Left, movefocus, l
bindd = $mainMod, Right, Focus Window Right, movefocus, r
bindd = $mainMod, Up, Focus Window Up, movefocus, u
bindd = $mainMod, Down, Focus Window Down, movefocus, d

# Move Windows
bindd = $mainMod SHIFT, Left, Move Window Left, movewindow, l
bindd = $mainMod SHIFT, Right, Move Window Right, movewindow, r
bindd = $mainMod SHIFT, Up, Move Window Up, movewindow, u
bindd = $mainMod SHIFT, Down, Move Window Down, movewindow, d

# Swap Windows
bindd = $mainMod SHIFT CTRL, Left, Swap Window Left, swapwindow, l
bindd = $mainMod SHIFT CTRL, Right, Swap Window Right, swapwindow, r
bindd = $mainMod SHIFT CTRL, Up, Swap Window Up, swapwindow, u
bindd = $mainMod SHIFT CTRL, Down, Swap Window Down, swapwindow, d

# Window Editing
binds {
  drag_threshold = 10    
}
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindd = $mainMod, O, Toggle Window Opacity, setprop, active opaque toggle

bindd = $mainMod SHIFT,  F, Toggle Window Floating Status, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 1200 800

bindd = $mainMod, F, Toggle Fullscreeen, fullscreen 
bindd = $mainMod, T, Toggle Window Tiling Status, settiled
bindd = $mainMod, P, Pin Window, exec, hyprctl dispatch setfloating && hyprctl dispatch resizeactive exact 725 510 && hyprctl dispatch pin
bindd = $mainMod, C, Center Floating Window, centerwindow

# Scroll through windows when layout is set to scrolling
bindl = $mainMod, mouse_down, workspace, +1
bindl = $mainMod, mouse_up, workspace, -1

# Volume
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume +1
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume -1 
# bindd = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMute, exec, ~/bin/knob-press
bindr = , XF86AudioMute, exec, ~/bin/knob-release

# Media Player (Spotify only)
bindd = , F11, Previous Spotify, exec, playerctl -p spotify previous
bindd = , F12, Next Spotify, exec, playerctl -p spotify next
bindd = , Delete, Play/Pause Spotify, exec, playerctl -p spotify play-pause

# Switch workspaces with mainMod + [0-9]
bindd = $mainMod, 1, Focus Workspace 1, workspace, 1
bindd = $mainMod, 2, Focus Workspace 2, workspace, 2
bindd = $mainMod, 3, Focus Workspace 3, workspace, 3
bindd = $mainMod, 4, Focus Workspace 4, workspace, 4
bindd = $mainMod, 5, Focus Workspace 5, workspace, 5
bindd = $mainMod, 6, Focus Workspace 6, workspace, 6
bindd = $mainMod, 7, Focus Workspace 7, workspace, 7
bindd = $mainMod, 8, Focus Workspace 8, workspace, 8
bindd = $mainMod, 9, Focus Workspace 9, workspace, 9
bindd = $mainMod, 0, Focus Workspace 0 (Monitor 2), workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9] (focuses selected workspace)
bind = $mainMod SHIFT, 1, settiled
bindd = $mainMod SHIFT, 1, Move To Workspace 1, movetoworkspace, 1

bind = $mainMod SHIFT, 2, settiled
bindd = $mainMod SHIFT, 2, Move To Workspace 2, movetoworkspace, 2

bind = $mainMod SHIFT, 3, settiled
bindd = $mainMod SHIFT, 3, Move To Workspace 3, movetoworkspace, 3

bind = $mainMod SHIFT, 4, settiled
bindd = $mainMod SHIFT, 4, Move To Workspace 4, movetoworkspace, 4

bind = $mainMod SHIFT, 5, settiled
bindd = $mainMod SHIFT, 5, Move To Workspace 5, movetoworkspace, 5

bind = $mainMod SHIFT, 6, settiled
bindd = $mainMod SHIFT, 6, Move To Workspace 6, movetoworkspace, 6

bind = $mainMod SHIFT, 7, settiled
bindd = $mainMod SHIFT, 7, Move To Workspace 7, movetoworkspace, 7

bind = $mainMod SHIFT, 8, settiled
bindd = $mainMod SHIFT, 8, Move To Workspace 8, movetoworkspace, 8

bind = $mainMod SHIFT, 9, settiled
bindd = $mainMod SHIFT, 9, Move To Workspace 9, movetoworkspace, 9

bind = $mainMod SHIFT, 0, settiled
bindd = $mainMod SHIFT, 0, Move To Workspace 0 (Monitor 2), movetoworkspace, 10

# Silent Workspace Movement
bind = $mainMod ALT SHIFT, 1, settiled
bindd = $mainMod ALT SHIFT, 1 , Silently Move To Workspace 1, movetoworkspacesilent, 1

bind = $mainMod ALT SHIFT, 2, settiled
bindd = $mainMod ALT SHIFT, 2 , Silently Move To Workspace 2, movetoworkspacesilent, 2

bind = $mainMod ALT SHIFT, 3, settiled
bindd = $mainMod ALT SHIFT, 3 , Silently Move To Workspace 3, movetoworkspacesilent, 3

bind = $mainMod ALT SHIFT, 4, settiled
bindd = $mainMod ALT SHIFT, 4 , Silently Move To Workspace 4, movetoworkspacesilent, 4

bind = $mainMod ALT SHIFT, 5, settiled
bindd = $mainMod ALT SHIFT, 5 , Silently Move To Workspace 5, movetoworkspacesilent, 5

bind = $mainMod ALT SHIFT, 6, settiled
bindd = $mainMod ALT SHIFT, 6 , Silently Move To Workspace 6, movetoworkspacesilent, 6

bind = $mainMod ALT SHIFT, 7, settiled
bindd = $mainMod ALT SHIFT, 7 , Silently Move To Workspace 7, movetoworkspacesilent, 7

bind = $mainMod ALT SHIFT, 8, settiled
bindd = $mainMod ALT SHIFT, 8 , Silently Move To Workspace 8, movetoworkspacesilent, 8

bind = $mainMod ALT SHIFT, 9, settiled
bindd = $mainMod ALT SHIFT, 9 , Silently Move To Workspace 9, movetoworkspacesilent, 9

bind = $mainMod ALT SHIFT, 0, settiled
bindd = $mainMod ALT SHIFT, 0 , Silently Move To Workspace 0 (Monitor 2), movetoworkspacesilent, 10

# extra workspace controls
bindd = $mainMod ALT, equal, Move Window To Empty Workspace, exec, ~/bin/hypr-move-to-empty-workspace

# special workspaces
### scratchpad
bind = $mainMod, Next, exec, hyprctl dispatch focusmonitor HDMI-A-1 && hyprctl dispatch togglespecialworkspace scratchpad
bind = $mainMod SHIFT, Next, exec, hyprctl dispatch setfloating && hyprctl dispatch resizeactive exact 1200 800 && hyprctl dispatch centerwindow && hyprctl dispatch movetoworkspace special:scratchpad

### mediaspace
bind = $mainMod, Prior, exec, hyprctl dispatch focusmonitor HDMI-A-1 && hyprctl dispatch togglespecialworkspace mediaspace 
# bind = $mainMod SHIFT, Prior, exec, hyprctl dispatch setfloating && hyprctl dispatch resizeactive exact 1200 800 && hyprctl dispatch centerwindow && hyprctl dispatch movetoworkspace special:mediaspace
bind = $mainMod SHIFT ALT, Prior, exec, ~/bin/launch-spotify

### discordspace
bind = $mainMod, Home, exec, hyprctl dispatch focusmonitor HDMI-A-1 && hyprctl dispatch togglespecialworkspace discordspace
# bind = $mainMod SHIFT, Home, exec, hyprctl dispatch setfloating && hyprctl dispatch resizeactive exact 1200 800 && hyprctl dispatch centerwindow && hyprctl dispatch movetoworkspace special:discordspace
bind = $mainMod SHIFT ALT, Home, exec, ~/bin/launch-discord

### socialspace
bind = $mainMod, End, exec, hyprctl dispatch focusmonitor HDMI-A-1 && hyprctl dispatch togglespecialworkspace socialspace
# bind = $mainMod SHIFT, End, exec, hyprctl dispatch setfloating && hyprctl dispatch resizeactive exact 1200 800 && hyprctl dispatch centerwindow && hyprctl dispatch movetoworkspace special:socialspace
bind = $mainMod SHIFT, End, exec, ~/bin/launch-instagram
bind = $mainMod SHIFT ALT, End, exec, ~/bin/launch-tiktok

# toggle floating workspace (debug)
bind = $mainMod SHIFT CTRL, Delete, togglespecialworkspace, floating

# Hyprland Environment
bindd = $mainMod SHIFT CTRL, R, Reload Hyprland, exec, ~/bin/reload-hyprland
bindd = $mainMod SHIFT CTRL, W, Reload Waybar, exec, ~/bin/reload-waybar
bindd = $mainMod, Q, Kill Active Window, killactive
bindd = $mainMod SHIFT, Q, Kill Active Window, killactive
bindd = $mainMod SHIFT CTRL, F12, Swap Active Workspaces Between Monitors, swapactiveworkspaces, DP-1 HDMI-A-1
bindd = $mainMod SHIFT, P, Display Manager, exec, ~/bin/launch-window-floating 1200 800 nwg-displays
bindd = $mainMod, L, Toggle Nightlight, exec, ~/bin/system-toggle-nightlight

# brightness control
### DP-1 (ASUS)
bind = , F1, exec, ~/bin/system-brightness-dp down
bind = , F2, exec, ~/bin/system-brightness-dp up

### HDMI-A-1 (Acer)
bind = , F3, exec, ~/bin/system-brightness-hdmi down
bind = , F4, exec, ~/bin/system-brightness-hdmi up
