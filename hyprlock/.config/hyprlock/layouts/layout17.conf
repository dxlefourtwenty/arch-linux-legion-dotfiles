source = $HOME/.config/themes/current/hyprlock.conf

# GENERAL
general {
    no_fade_in = true
    no_fade_out = true
    disable_loading_bar = false
    hide_cursor = true
    immediate_render = true
}

# BACKGROUND
background {
    monitor =
    path = /tmp/hyprlock-random-wallpaper
    color = $clr_base
    blur_passes = 1
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.8916
    vibrancy_darkness = 0.0
}



# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d - %I:%M")"
    color = $clr_text
    font_size = 15
    position = 0, 500
    halign = center
    valign = center
}


 

# Authenticate box
shape {
    monitor =
    size = 500, 100
    color =$clr_transparent
    rounding = 0
    border_size = 2
    border_color = $clr_text_100
    rotate = 0
    position = 0, 0
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 200, 20
    color =$clr_base
    rounding = 0
    border_size = 2
    border_color = $clr_base
    rotate = 0
    position = -130, 50
    halign = center
    valign = center
    zindex = 5
}

# USER
label {
    monitor =
    text =  Authenticate into archlinux
    color = $clr_text_80
    font_size = 11
    position = -130, 50
    halign = center
    valign = center
    zindex = 5
}

# USER
label {
    monitor =
    text = <b>  Username: $USER </b>
    color = $clr_text_80
    font_size = 11
    position = -150 , 15
    halign = center
    valign = center
    zindex = 1
}

# USER
label {
    monitor =
    text = <b> Password: </b>
    color = $clr_text_80
    font_size = 11
    position = -190, -15
    halign = center
    valign = center
    zindex = 5
}

# INPUT FIELD
input-field {
    monitor =
    size = 200, 50
    outline_thickness = -1
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = false
    outer_color = $clr_transparent
    inner_color =$clr_transparent
    font_color = $clr_text
    fade_on_empty = false
    placeholder_text =
    hide_input = false
    position = 800 , -15
    halign = left
    valign = center
}


# NOTIFICATION
label {
    monitor =
    text =
    color = $clr_text_90
    font_size = 14
    position = 0, 400
    halign = center
    valign = center
    zindex = 10
}
