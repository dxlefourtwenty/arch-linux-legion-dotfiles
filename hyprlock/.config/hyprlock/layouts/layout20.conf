source = $HOME/.config/themes/current/hyprlock.conf

$wallpapers = $HOME/.config/hyprlock/wallpapers

# BACKGROUND
background {
    monitor =
    path = /tmp/hyprlock-random-wallpaper
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    disable_loading_bar = false
    grace = 1
}

# --- LEFT COLUMN ---

# LOGIN CARD
shape {
    monitor =
    size = 360, 380
    color = $clr_base_30
    rounding = 25
    border_size = 0
    position = -200, 160
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = cmd[update:1000] /usr/bin/hostnamectl --static 2>/dev/null || /usr/bin/cat /etc/hostname
    color = $clr_subtext0_100
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = -200, 300
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = Log in
    color = $clr_rosewater_100
    font_size = 42
    font_family = JetBrainsMono Nerd Font
    position = -200, 240
    halign = center
    valign = center
    zindex = 2
}

# Username Display 
shape {
    monitor =
    size = 320, 70
    color = $clr_red_100
    rounding = 20
    position = -200, 130
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = username
    color = $clr_base_rgba
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = -310, 150
    halign = center
    valign = center
    zindex = 3
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$USER</b>"
    color = $clr_base_rgba
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = -290, 115
    halign = center
    valign = center
    zindex = 3
}

# Password Input
label {
    monitor =
    text = password
    color = $clr_base_rgba
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = -310, 60
    halign = center
    valign = center
    zindex = 3
}

input-field {
    monitor =
    size = 320, 70
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = false
    outer_color = $clr_transparent
    inner_color = $clr_red_100
    font_color = $clr_base_rgba
    fade_on_empty = false
    placeholder_text = 
    hide_input = false
    rounding = 20
    position = -200, 40
    halign = center
    valign = center
    zindex = 2
}

# CLOCK CARD
shape {
    monitor =
    size = 360, 160
    color = $clr_base_30
    rounding = 25
    position = -200, -140
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = cmd[update:1000] date +"<b>%H:%M</b>"
    color = $clr_rosewater_100
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = -200, -125
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] uptime -p | sed -e 's/up /  UPTIME /' -e 's/ hours, /H/' -e 's/ minutes/M/' -e 's/ hour, /H/' -e 's/ minute/M/'
    color = $clr_subtext0_100
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = -260, -195
    halign = center
    valign = center
    zindex = 2
}


# --- RIGHT COLUMN ---

# PROFILE CARD (Blurred)
shape {
    monitor =
    size = 360, 380
    color = $clr_base_30
    rounding = 25
    position = 200, 160
    halign = center
    valign = center
    zindex = 1
}

image {
    monitor =
    path = $wallpapers/me.jpeg
    size = 120
    rounding = 20
    border_size = 4
    border_color = $clr_red_100
    position = 200, 260
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%a" | tr '[:lower:]' '[:upper:]')</b>"
    color = $clr_rosewater_100
    font_size = 38
    font_family = JetBrainsMono Nerd Font
    position = 200, 150
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] date +"%d %B, %Y"
    color = $clr_subtext0_100
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 200, 100
    halign = center
    valign = center
    zindex = 11
}

# SYSTEM/MEDIA STATUS CARD
shape {
    monitor =
    size = 360, 320
    color = $clr_base_80
    rounding = 25
    position = 200, -140
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = $clr_base_50
    zindex = 10
}

# Media Info
label {
    monitor =
    text = cmd[update:1000] player=$(playerctl -l 2>/dev/null | head -n 1); if [ "$player" = "spotify" ]; then echo " <b> </b> "; elif [ -n "$player" ]; then echo "  "; else echo " 󰎆 "; fi
    color = $clr_rosewater_100
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 200, -10
    halign = center
    valign = center
    zindex = 11
}

label {
    monitor =
    text = cmd[update:1000] title=$(playerctl metadata xesam:title 2>/dev/null | cut -c1-24); if [ -z "$title" ]; then echo "No Music Playing"; else echo "$title"; fi
    color = $clr_rosewater_100
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 200, -40
    halign = center
    valign = center
    zindex = 11
}

label {
    monitor =
    text = cmd[update:1000] artist=$(playerctl metadata xesam:artist 2>/dev/null | cut -c1-30); if [ -z "$artist" ]; then echo ""; else echo "$artist"; fi
    color = $clr_subtext0_100
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 200, -60
    halign = center
    valign = center
    zindex = 11
}

# Connectivity Buttons
shape {
    monitor =
    size = 150, 75
    color = $clr_peach_100
    rounding = 20
    position = 115, -130
    halign = center
    valign = center
    zindex = 11
}

label {
    monitor =
    text =  <b> </b> 
    color = $clr_base_rgba
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 115, -120
    halign = center
    valign = center
    zindex = 12
}

label {
    monitor =
    text = cmd[update:3000] $HOME/.config/hyprlock/scripts/wifi-status.sh
    color = $clr_base_rgba
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 115, -145
    halign = center
    valign = center
    zindex = 12
}

shape {
    monitor =
    size = 150, 75
    color = $clr_peach_100
    rounding = 20
    position = 285, -130
    halign = center
    valign = center
    zindex = 11
}

label {
    monitor =
    text =  <b> </b> 
    color = $clr_base_rgba
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 285, -120
    halign = center
    valign = center
    zindex = 12
}

label {
    monitor =
    text = cmd[update:1000] bt=$(/usr/bin/bluetoothctl info 2>/dev/null | /usr/bin/grep "Name:" | /usr/bin/cut -d ' ' -f 2- | /usr/bin/cut -c 1-14); if [ -z "$bt" ]; then echo "Disconnected"; else echo "$bt"; fi
    color = $clr_base_rgba
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 285, -145
    halign = center
    valign = center
    zindex = 12
}

# Battery Bar
shape {
    monitor =
    size = 320, 100
    color = $clr_red_100
    rounding = 25
    position = 200, -235
    halign = center
    valign = center
    zindex = 11
}

# Battery Inner icon block
shape {
    monitor =
    size = 100, 20
    color = $clr_base_rgba
    rounding = 5
    position = 200, -205
    halign = center
    valign = center
    zindex = 12
}

label {
    monitor =
    text = cmd[update:1000] status=$(cat /sys/class/power_supply/BAT0/status 2>/dev/null); if [ "$status" = "Discharging" ]; then echo " <b>!</b> "; else echo " <b>󰚥</b> "; fi
    color = $clr_red_100
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 200, -205
    halign = center
    valign = center
    zindex = 13
}

label {
    monitor =
    text = cmd[update:1000] cat /sys/class/power_supply/BAT0/capacity | sed 's/.*/<b>&%<\/b>/'
    color = $clr_base_rgba
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 200, -235
    halign = center
    valign = center
    zindex = 12
}

label {
    monitor =
    text = cmd[update:1000] cat /sys/class/power_supply/BAT0/status
    color = $clr_base_rgba
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 200, -265
    halign = center
    valign = center
    zindex = 12
}
