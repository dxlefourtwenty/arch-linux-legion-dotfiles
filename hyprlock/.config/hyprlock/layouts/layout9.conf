source = $HOME/.config/themes/current/hyprlock.conf

$wall = $HOME/.config/hyprlock/wallpapers/9.png

# BACKGROUND
background {
    monitor =
    path = /tmp/hyprlock-random-wallpaper
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8916
    vibrancy = 0.8916
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Profie-Photo
image {
    monitor =
    path = ~/bin/images/profile-picture.png
    border_size = 2
    border_color = $clr_blue_71
    size = 100
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 170
    halign = center
    valign = center
}

# NAME
label {
    monitor =
    text = $USER
    color = $clr_text_80
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 20
    position = 0, 80
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = $clr_text_80
    font_size = 60
    position = 0, -20
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = $clr_text_80
    font_size = 19
    font_family = SF Pro Display Bold
    position = 0, -90
    halign = center
    valign = center
}

# MAin-BOX
shape {
    monitor =
    size = 500, 500
    color = $clr_base_62
    rounding = 30
    border_size = 0
    border_color = $primary_8_rgba 
    rotate = 0
    xray = false 
    position = 0, -70
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 320, 55
    color = $clr_surface0_10
    rounding = -1
    border_size = 0
    border_color = $clr_text_100
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)
    position = 0, -190
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =     $USER
    color = $clr_text_80
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 16
    position = 0, -190
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $clr_transparent
    inner_color = $clr_surface0_10
    font_color = $clr_text
    check_color = $clr_green_60
    fail_color = $clr_red_60
    fade_on_empty = false
    placeholder_text = <i>  Enter Pass</i>
    hide_input = false
    position = 0, -268
    halign = center
    valign = center
}
