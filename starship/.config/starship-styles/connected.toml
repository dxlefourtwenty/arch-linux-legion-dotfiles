[package]
format = '[$symbol$version ]($style)'
style = 'bold fg:bright-purple bg:color_bg'
symbol = "у°Ҹ— "

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = 'bold fg:yellow bg:color_bg'
symbol = "оҲө "

[ruby]
format = '[$symbol($version )]($style)'
style = 'bold fg:red bg:color_bg'
symbol = "оһ‘ "

[rust]
format = '[$symbol($version )]($style)'
style = 'bold fg:red bg:color_bg'
symbol = "уұҳ— "


[battery]
format = '[$symbol ]($style)'
full_symbol = '[у°Ғ№ $percentage](bold fg:70 bg:color_bg)'
unknown_symbol = '[у°Ӯ‘ ](bold fg:color_fg bg:color_bg)'
empty_symbol = '[у°ӮҺ $percentage](bold fg:160 bg:color_bg)'
disabled = true

[[battery.display]]
threshold = 100
charging_symbol = '[у°Ғ№ $percentage](bold fg:70 bg:color_bg)'
discharging_symbol = '[у°Ғ№ $percentage](bold fg:178 bg:color_bg)'
style = 'bg:color_bg'

