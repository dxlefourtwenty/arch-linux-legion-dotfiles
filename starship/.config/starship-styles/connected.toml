"$schema" = 'https://starship.rs/config-schema.json'
format = """
[оӮ¶](color_bg)\
$os\
[в•ұ ](fg:color_fg bg:color_bg)\
$directory\

[оӮј](fg:color_bg)\
$fill\
[оӮә](fg:color_bg)\
[ ](bg:color_bg)\
($status[в•ұ ](fg:color_fg bg:color_bg))\
($cmd_duration[в•ұ ](fg:color_fg bg:color_bg))\
((fg:color_fg bg:color_bg)$git_branch)\
($git_status[в•ұ ](fg:color_fg bg:color_bg))\
($direnv[в•ұ ](fg:color_fg bg:color_bg))\
($package[в•ұ ](fg:color_fg bg:color_bg))\
($c[в•ұ ](fg:color_fg bg:color_bg))\
($cpp[в•ұ ](fg:color_fg bg:color_bg))\
($cmake[в•ұ ](fg:color_fg bg:color_bg))\
($conda[в•ұ ](fg:color_fg bg:color_bg))\
($container[в•ұ ](fg:color_fg bg:color_bg))\
($docker_context[в•ұ ](fg:color_fg bg:color_bg))\
($java[в•ұ ](fg:color_fg bg:color_bg))\
($lua[в•ұ ](fg:color_fg bg:color_bg))\
($nodejs[в•ұ ](fg:color_fg bg:color_bg))\
($python[в•ұ ](fg:color_fg bg:color_bg))\
($ruby[в•ұ ](fg:color_fg bg:color_bg))\
($rust[в•ұ ](fg:color_fg bg:color_bg))\
($username$hostname[в•ұ ](fg:color_fg bg:color_bg))\
$time\
([в•ұ ](fg:color_fg bg:color_bg)$battery)\
[оӮҙ](fg:color_bg)
$character\
"""

add_newline = true
palette = 'dark'

[palettes.dark]
color_bg = 'black'
color_fg = 'white'

[cmd_duration]
min_time = 3000
format = '[$duration пү’ ]($style)'
style = 'fg:white bg:color_bg'

[status]
disabled = false
format = '[$symbol( $common_meaning)( $signal_name)( $signal_number)( $maybe_int) ]($style)'
style = 'bold fg:red bg:color_bg'
success_style = 'bold fg:green bg:color_bg'
symbol = 'вңҳ'
map_symbol = false
pipestatus = true
pipestatus_format = '[$pipestatus]($style)'

[character]
success_symbol = '[вқҜ](bold fg:green)'
error_symbol = '[вқҜ](bold fg:red)'
vimcmd_symbol = '[вқ®](bold fg:white)'
vimcmd_replace_one_symbol = '[в–¶](bold fg:white)'
vimcmd_replace_symbol = '[в–¶](bold fg:white)'
vimcmd_visual_symbol = '[V](bold fg:white)'

[time]
disabled = false
format = '[$time пҖ— ]($style)'
style = 'fg:purple bg:color_bg'


[fill]
symbol = 'в”Җ'
style = 'fg:bright-black'


[os]
format = '[ $symbol ]($style)'
style = 'fg:bright-red bg:color_bg'
disabled = false


[directory]
format = '[$read_only]($read_only_style)[ пҒј ](fg:blue bg:color_bg)[ $path ]($style)'
style = 'fg:bright-cyan bg:color_bg'
read_only_style = 'bold fg:cyan bg:color_bg'
read_only = "у°Ңҫ "
home_symbol = '~'
truncate_to_repo = false
fish_style_pwd_dir_length = 100

[git_branch]
format = '[$symbol$branch(:$remote_branch) ]($style)'
symbol = "п„Ұ "
style = 'bold fg:green bg:color_bg'

[git_status]
format = '([$all_status$ahead_behind]($style))'
style = 'bold fg:blue bg:color_bg'
conflicted = '[~${count} ](bold fg:red bg:color_bg)'
stashed = '*${count} '
ahead = 'вҮЎ${count} '
behind = 'вҮЈ${count} '
diverged = 'вҮ ${behind_count} вҮў${ahead_count} '
untracked = '[?${count} ](bold fg:purple bg:color_bg)'
modified = '[!${count} ](bold fg:bright-purple bg:color_bg)'
staged = '[+${count} ](bold fg:green bg:color_bg)'
renamed = 'В»${count} '
deleted = '[вңҳ${count} ](bold fg:bright-red bg:color_bg)'

[direnv]
format = '[$symbol$loaded/$allowed ]($style)'
style = 'bold fg:yellow bg:color_bg'

[c]
format = '[$symbol($version(-$name) )]($style)'
style = 'bold fg:bright-yellow bg:color_bg'
symbol = "оҳһ "

[cpp]
format = '[$symbol($version(-$name) )]($style)'
style = 'bold fg:bright-yellow bg:color_bg'
symbol = "оҳқ "

[cmake]
format = '[$symbol($version )]($style)'
style = 'bold fg:blue bg:color_bg'
symbol = "оһ” "

[conda]
format = '[$symbol$environment ]($style)'
style = 'bold fg:green bg:color_bg'
symbol = "п„Ң "

[container]
format = '[$symbol \[$name\] ]($style)'
style = 'bold dimmed fg:red bg:color_bg'

[docker_context]
format = '[$symbol$context ]($style)'
style = 'bold fg:blue bg:color_bg'
symbol = "пҢҲ "

[username]
format = '[$user]($style)'
style_root = 'bold fg:yellow bg:color_bg'
style_user = 'fg:white bg:color_bg'
show_always = true

[hostname]
format = '[@$hostname ]($style)'
style = 'fg:white bg:color_bg'
ssh_only = false

[java]
format = '[${symbol}(${version} )]($style)'
style = 'dimmed fg:red bg:color_bg'
symbol = "оү– "

[lua]
format = '[$symbol($version )]($style)'
style = 'bold fg:blue bg:color_bg'
symbol = "оҳ  "

[nodejs]
format = '[$symbol($version )]($style)'
style = 'bold fg:red bg:color_bg'
symbol = "оңҳ "

[os.symbols]
Alpaquita = "оӘў "
Alpine = "пҢҖ "
AlmaLinux = "пҢқ "
Amazon = "пү° "
Android = "п…» "
Arch = "пҢғ "
Artix = "пҢҹ "
CachyOS = "пҢғ "
