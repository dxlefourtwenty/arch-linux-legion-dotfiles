"$schema" = "https://starship.rs/config-schema.json"

command_timeout = 1500

format = """
[¯éÂ](fg:color_bg1)\
$os\
$username\
$hostname\
[¯é┤ ](fg:color_bg1 bg:color_bg2)\
$directory\
[¯é┤ ](fg:color_bg2 bg:color_bg3)\
$git_branch\
$git_status\
[¯é┤ ](fg:color_bg3 bg:color_bg4)\
$c\
$dotnet\
$java\
$kotlin\
$nodejs\
[¯é┤ ](fg:color_bg4 bg:color_bg5)\
$cmd_duration\
[¯é┤ ](fg:color_bg5)\
\n$character\
"""

palette = "normal"

[palettes.normal]
color_bg1 = "bright-blue"
color_bg2 = "blue"
color_bg3 = "green"
color_bg4 = "bright-black"
color_bg5 = "purple"

color_blue = "bright-blue"
color_gray = "bright-black"
color_red = "bright-red"
color_white = "white"

[character]
error_symbol = "[ÔØ»](bold color_red)"
success_symbol = "[ÔØ»](bold color_blue)"

[cmd_duration]
format = "[$duration](bg:color_bg5 fg:black)"
min_time = 500

[directory]
style = "bg:color_bg2 fg:black"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = "´Éİ"
style = "bg:color_bg3 fg:black"
format = "[$symbol $branch]($style)"

[git_status]
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
deleted = "´ÆÄ"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
format = '[( $all_status$ahead_behind)]($style)'
style = "bold bg:color_bg3 fg:color_red"

[hostname]
format = "[@$hostname]($style)"
ssh_only = true
ssh_symbol = "¯¼ü "
style = "bg:color_bg1 fg:black"

[os]
format = "[$symbol]($style)"
style = "bg:color_bg1 fg:black"
disabled = false

[username]
disabled = false
format = "[$user]($style)"
show_always = false
style_root = "bg:color_bg1 fg:color_red"
style_user = "bg:color_bg1 fg:color_white"

# Code symbols
[c]
format = '[$symbol]($style)'
style = "bg:color_bg4 fg:blue"
symbol = "¯İŞ "

[dotnet]
format = '[$symbol]($style)'
style = "bg:color_bg4 fg:bright-purple"
symbol = "¯Ø┐ "

[java]
format = '[$symbol]($style)'
style = "bg:color_bg4 fg:yellow"
symbol = "¯ëû "

[kotlin]
format = '[$symbol]($style)'
style = "bg:color_bg4 fg:bright-yellow"
symbol = "¯İ┤ "

[nodejs]
style = "bg:color_bg4 fg:yellow"
format = '[$symbol($version)]($style)'
symbol = "¯£İ "

