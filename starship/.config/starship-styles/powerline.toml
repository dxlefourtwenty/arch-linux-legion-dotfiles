"$schema" = "https://starship.rs/config-schema.json"
add_newline = true

format = """
[‚ē≠‚ĒÄÓā∂](yellow)\
$os\
$username\
[Óāį](bg:bright-yellow fg:yellow)\
$directory\
[Óāį](fg:bright-yellow bg:cyan)\
$git_branch\
$git_status\
[Óāį](fg:cyan bg:blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Óāį](fg:blue bg:bright-black)\
$docker_context\
$conda\
$pixi\
[Óāį](fg:bright-black bg:black)\
$time\
[Óāī ](fg:black)\
$line_break$character"""

[os]
disabled = false
style = "bg:yellow fg:black"

[os.symbols]
EndeavourOS = "ůį£á"
Arch = "ůį£á"

[username]
show_always = true
style_user = "bg:yellow fg:black"
style_root = "bg:yellow fg:black"
format = "[ $user ]($style)"

[directory]
style = "fg:black bg:bright-yellow"
format = "[ $path ]($style)"
truncation_length = 1
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = "Ôźė"
style = "bg:cyan"
format = "[[ $symbol $branch ](fg:black bg:cyan)]($style)"

[git_status]
style = "bg:cyan"
format = "[[($all_status$ahead_behind )](fg:black bg:cyan)]($style)"

[nodejs]
symbol = "Óúė"
style = "bg:blue"
format = "[[ $symbol( $version) ](fg:black bg:blue)]($style)"

[c]
symbol = "Óėě "
style = "bg:blue"
format = "[[ $symbol( $version) ](fg:black bg:blue)]($style)"

[cpp]
symbol = "ÓėĚ "
style = "bg:blue"
format = "[[ $symbol( $version) ](fg:black bg:blue)]($style)"

[rust]
symbol = "Óě®"
style = "bg:blue"
format = "[[ $symbol( $version) ](fg:black bg:blue)]($style)"

[golang]
symbol = "Óėß"
style = "bg:blue"
format = "[[ $symbol( $version) ](fg:black bg:blue)]($style)"

[php]
symbol = "Óėą"
style = "bg:blue"
format = "[[ $symbol( $version) ](fg:black bg:blue)]($style)"

[java]
symbol = "ÓČĖ"
style = "bg:blue"
format = "[[ $symbol( $version) ](fg:black bg:blue)]($style)"

[kotlin]
symbol = "Óėī"
style = "bg:blue"
format = "[[ $symbol( $version) ](fg:black bg:blue)]($style)"

[haskell]
symbol = "Óėü"
style = "bg:blue"
format = "[[ $symbol( $version) ](fg:black bg:blue)]($style)"

[python]
symbol = "ÓėÜ"
style = "bg:blue"
format = "[[ $symbol( $version) (\\($virtualenv\\) )](fg:black bg:blue)]($style)"

[docker_context]
symbol = "ÔĆą"
style = "bg:bright-black"
format = "[[ $symbol( $context) ](fg:cyan bg:bright-black)]($style)"

[conda]
style = "bg:bright-black"
format = "[[ $symbol( $environment) ](fg:cyan bg:bright-black)]($style)"

[pixi]
style = "bg:bright-black"
format = "[[ $symbol( $version)( $environment) ](fg:black bg:bright-black)]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:black"
format = "[[ Ôźļ $time ](fg:bright-white bg:black)]($style)"

[line_break]
disabled = false

[character]
success_symbol = "[‚ēį‚ĒÄ](bold fg:yellow)[ůį£ß](bold fg:green)"
error_symbol = "[‚ēį‚ĒÄ](bold fg:yellow)[ůį£¶](bold fg:red)"
vimcmd_symbol = "[Ôźī](bold fg:green)"
vimcmd_replace_one_symbol = "[Ôźī](bold fg:magenta)"
vimcmd_replace_symbol = "[Ôźī](bold fg:magenta)"
vimcmd_visual_symbol = "[Ôźī](bold fg:yellow)"
