
format = """\
[╭╴](fg:arrow)\
$username\
(at $directory)\
$cmd_duration\
$fill \
(via $git_branch) \
(via \
$python\
$conda\
$nodejs\
$c\
$rust\
$java)\
\n[╰─](fg:arrow)$character\
"""
# Add the modules you need

# Disable the blank line at the start of the prompt
add_newline = true


palette = "normal"


[palettes.normal]
arrow = "bright-black"
os = "cyan"
os_admin = "yellow"
directory = "bright-cyan"
time = "bright-yellow"
node = "bright-green"
git = "green"
git_status = "white"
python = "yellow"
conda = "bright-green"
java = "bright-yellow"
rust = "red"
clang = "bright-cyan"
duration = "red"
text_color = "black"
text_light = "white"

# I disabled some modules (Rust, Java...) since some things aren't installed in my machine, enable them if you need.

[username]
style_user = 'bold os'
style_root = 'bold os_admin'
format = '[  $user](fg:$style) '
disabled = false
show_always = true

[os]
format = "on [($name)]($style) "
style = "bold blue"
disabled = true

[os.symbols]
Alpine = " "
Arch = " "
Debian = " "
EndeavourOS = " "
Fedora = " "
Linux = " "
Macos = " "
Manjaro = " "
Mint = " "
NixOS = " "
openSUSE = " "
Pop = " "
SUSE = " "
Ubuntu = " "
Windows = " "

[character]
success_symbol = "[󰍟](fg:arrow)"
error_symbol = "[󰍟](fg:red)"

[directory]
format = "[$path](bold $style)[$read_only]($read_only_style) "
truncation_length = 2
style = "fg:directory"
read_only_style = "fg:directory"
before_repo_root_style = "fg:directory"
truncation_symbol = "…/"
truncate_to_repo = true
read_only ="  "

[time]
disabled = false
format = "at [󱑈 $time]($style)"
time_format = "%H:%M"
style = "bold fg:time"

[cmd_duration]
format = "took [ $duration]($style) "
style = "bold fg:duration"
min_time = 500

[git_branch]
format = "[$symbol$branch]($style)"
style = "bold fg:git"
symbol = " "

[git_status]
format = '[ $all_status$ahead_behind ]($style)'
style = "fg:text_color bg:git"
disabled = false

[docker_context]
disabled=true
symbol = " "

[package]
disabled=true

[fill]
symbol = "─"
style = 'fg:bright-black'

[nodejs]
format = "[$symbol$version ]($style)"
style = "fg:node"
symbol = " "
version_format = "${raw}"
disabled=false

[python]
disabled=false
format = '[${symbol}${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = " "
version_format = "${raw}"
style = "fg:python"

[conda]
format = "[$symbol$environment ]($style)"
style = "fg:conda"
ignore_base = false
disabled = false
symbol = " "

[java]
format = "[$symbol$version ]($style)"
style = "fg:java"
version_format = "${raw}"
symbol = " "
disabled = false

[c]
format = "[$symbol($version(-$name)) ]($style)"
style = "fg:clang"
symbol = " "
version_format = "${raw}"
disabled=false

[rust]
format ="[$symbol$version ]($style)"
style = "fg:rust"
symbol = " "
version_format = "${raw}"
disabled=false
