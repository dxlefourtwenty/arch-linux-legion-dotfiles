# tmux flags
#set -g status-right ""
#set -g status-left ""
# set -g status-style bg=default
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Enable status bar
set -g status on
set -g status-position top
set -g status-interval 5

# Use terminal default background
set -g status-style "bg=default,fg=colour7"

# Left side: session name
set -g status-right-length 100
set -g status-right "#[fg=colour3]#(printf \"/\"; dirname \"#{pane_current_path}\" | awk -F/ '{print \$(NF)\"/\"}' | tr -d '\n'; basename \"#{pane_current_path}\") #[fg=colour4,bold][#S]"

# Window list styling
set -g status-left ""
set -g window-status-format "#[fg=colour8] #I #W "
set -g window-status-current-format "#[fg=colour6,bold] #I #W "

# Remove ugly separators
set -g status-left-style none
set -g status-right-style none
set -g window-status-separator ""

# set first window index to be 1
set -g base-index 1
set -g pane-base-index 1

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse
set -g mouse on

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Switch windows without prefix using Alt+number (spawn in cwd)
bind -n M-1 run-shell "tmux select-window -t 1 2>/dev/null || tmux new-window -t 1 -c '#{pane_current_path}'"
bind -n M-2 run-shell "tmux select-window -t 2 2>/dev/null || tmux new-window -t 2 -c '#{pane_current_path}'"
bind -n M-3 run-shell "tmux select-window -t 3 2>/dev/null || tmux new-window -t 3 -c '#{pane_current_path}'"
bind -n M-4 run-shell "tmux select-window -t 4 2>/dev/null || tmux new-window -t 4 -c '#{pane_current_path}'"
bind -n M-5 run-shell "tmux select-window -t 5 2>/dev/null || tmux new-window -t 5 -c '#{pane_current_path}'"
bind -n M-6 run-shell "tmux select-window -t 6 2>/dev/null || tmux new-window -t 6 -c '#{pane_current_path}'"
bind -n M-7 run-shell "tmux select-window -t 7 2>/dev/null || tmux new-window -t 7 -c '#{pane_current_path}'"
bind -n M-8 run-shell "tmux select-window -t 8 2>/dev/null || tmux new-window -t 8 -c '#{pane_current_path}'"
bind -n M-9 run-shell "tmux select-window -t 9 2>/dev/null || tmux new-window -t 9 -c '#{pane_current_path}'"

# Move window to index using Alt+Shift+number
bind -n M-! move-window -t 1
bind -n M-@ move-window -t 2
bind -n M-# move-window -t 3
bind -n M-$ move-window -t 4
bind -n M-% move-window -t 5
bind -n M-^ move-window -t 6
bind -n M-& move-window -t 7
bind -n M-* move-window -t 8
bind -n M-( move-window -t 9

# Automatically renumber windows
set -g renumber-windows on

# Split right
bind Right split-window -h -c "#{pane_current_path}"
bind -n C-M-Right split-window -h -c "#{pane_current_path}"

# Split down
bind Down split-window -v -c "#{pane_current_path}"
bind -n C-M-Down split-window -v -c "#{pane_current_path}"

# Kill current pane
bind Left kill-pane
bind -n C-M-Left kill-pane
bind -n M-Q kill-pane

# Open a new terminal in the pwd
bind c new-window -c "#{pane_current_path}"
bind -n M-p new-window -c "#{pane_current_path}"

# Open a new terminal in the root dir
bind -n M-o new-window 

# Rename window
bind -n M-n command-prompt -I "#W" "rename-window '%%'"

