[layout]
anchor = "top-right"
screen = "HDMI-A-1"
width = 350
outer_margin = 12
top_margin = 28
right_margin = 28
bottom_margin = 28
left_margin = 28
minimum_height = 40

[notifications]
default_timeout_ms = 5000
max_icon_size = 64
max_notifications = 4
text_gap = 0

[animation]
enabled = true
enter_duration_ms = 180
exit_duration_ms = 140
move_duration_ms = 140
fade_duration_ms = 140
slide_distance = 32
enter_from = "right"
exit_to = "right"
easing = "out-cubic"
